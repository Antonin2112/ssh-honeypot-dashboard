name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Trivy
        run: |
          wget -qO- https://github.com/aquasecurity/trivy/releases/download/v0.69.1/trivy_0.69.1_Linux-64bit.tar.gz | tar xz
          sudo mv trivy /usr/local/bin/

      - name: Build images
        run: docker compose build

      - name: Scan api1
        run: trivy image --exit-code 1 --severity MEDIUM,HIGH,CRITICAL final_project-api1

      - name: Scan api2
        run: trivy image --exit-code 1 --severity MEDIUM,HIGH,CRITICAL final_project-api2

      - name: Scan frontend
        run: trivy image --exit-code 1 --severity MEDIUM,HIGH,CRITICAL final_project-frontend

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push api1
        uses: docker/build-push-action@v5
        with:
          context: ./api1
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cyberwatch-api1:latest

      - name: Build and push api2
        uses: docker/build-push-action@v5
        with:
          context: ./api2
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cyberwatch-api2:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cyberwatch-frontend:latest